<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Máy Tính Lương OT</title>

<style>
*{box-sizing:border-box;font-family:Segoe UI,Arial}

body{
margin:0;
background:linear-gradient(135deg,#3a7bd5,#00d2ff);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
background:white;
padding:30px;
width:420px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
}

h2{text-align:center;margin-bottom:20px}

label{font-weight:600}

input{
width:100%;
padding:10px;
margin:6px 0 10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
font-size:14px
}

.add{background:#eee;width:100%}

.delete{
background:#ff6b6b;
color:#fff;
margin-left:5px;
}

.row{
display:flex;
gap:5px
}

.row input{
flex:1
}

.result{
margin-top:20px;
background:#f6f6f6;
padding:15px;
border-radius:10px
}

.big{
font-size:18px;
font-weight:bold;
color:#2196f3
}

.formula{
font-size:12px;
color:#555;
margin-top:6px
}

</style>
</head>

<body>

<div class="container">

<h2>💰 Máy Tính Lương OT</h2>

<label>Lương cơ bản</label>
<input id="luong" onfocus="unformat(this)" onblur="formatMoney(this)" oninput="calc()">

<div id="phuCapBox"></div>

<button id="addBtn" class="add" onclick="add()">➕ Thêm khoản thu nhập</button>

<label>Số ngày công</label>
<input id="ngay" oninput="calc()">

<label>OT 150%</label>
<input id="ot150" oninput="calc()">

<label>OT 200%</label>
<input id="ot200" oninput="calc()">

<label>OT 300%</label>
<input id="ot300" oninput="calc()">

<div class="result">

<p>Tổng phụ cấp: <span id="pc">0</span> đ</p>
<p>Tổng OT: <span id="ot">0</span> đ</p>
<p>BHXH (10.5%): <span id="bh">0</span> đ</p>

<p class="big">Lương thực lãnh: <span id="net">0</span> đ</p>

<p class="formula" id="f1"></p>
<p class="formula" id="f2"></p>

</div>

</div>

<script>

const max=3

function num(v){
if(!v) return 0

v=v.replace(/\s/g,'')

if(v.includes(',') && v.includes('.')){
v=v.replace(/\./g,'').replace(',','.')
}
else if(v.includes(',')){
v=v.replace(',','.')
}
else{
v=v.replace(/\./g,'')
}

return parseFloat(v)||0
}

function vnd(v){
return Math.round(v).toLocaleString("vi-VN")
}

function formatMoney(input){
let n=num(input.value)
if(n) input.value=vnd(n)
calc()
}

function unformat(input){
let n=num(input.value)
if(n) input.value=n
}

function add(){

let box=document.getElementById("phuCapBox")

if(box.children.length>=max) return

let d=document.createElement("div")
d.className="row"

d.innerHTML=`
<input class="pc" placeholder="Khoản thu nhập" oninput="calc()">
<button class="delete" onclick="removeItem(this)">✖</button>
`

box.appendChild(d)

toggleAdd()

}

function removeItem(btn){

btn.parentElement.remove()

toggleAdd()

calc()

}

function toggleAdd(){

let box=document.getElementById("phuCapBox")

document.getElementById("addBtn").style.display=
box.children.length>=max?"none":"block"

}

function calc(){

let luong=num(document.getElementById("luong").value)
let ngay=num(document.getElementById("ngay").value)

if(!luong || !ngay) return

let ot150=num(document.getElementById("ot150").value)
let ot200=num(document.getElementById("ot200").value)
let ot300=num(document.getElementById("ot300").value)

let pc=[...document.querySelectorAll(".pc")]
.reduce((s,e)=>s+num(e.value),0)

let base=luong/ngay/8

let ot=base*(ot150*1.5 + ot200*2 + ot300*3)

let bh=luong*0.105

let net=luong + pc + ot - bh

document.getElementById("pc").innerText=vnd(pc)
document.getElementById("ot").innerText=vnd(ot)
document.getElementById("bh").innerText=vnd(bh)
document.getElementById("net").innerText=vnd(net)

document.getElementById("f1").innerText=
`Tiền OT = (${vnd(luong)} / ${ngay} / 8) × (${ot150}×1.5 + ${ot200}×2 + ${ot300}×3) = ${vnd(ot)}`

document.getElementById("f2").innerText=
`Lương thực lãnh = ${vnd(luong)} + ${vnd(pc)} + ${vnd(ot)} − ${vnd(bh)} = ${vnd(net)}`

}

</script>

</body>
</html>
